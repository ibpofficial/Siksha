        async function generateQuestionsWithAI(topic, subject, difficulty, language = 'English') {
            const prompt = `You are an educational expert creating questions for young students (Grade 1-3).
            Create 5 multiple-choice questions for the subject: ${subject}, specifically focusing on: ${topic}.
            The difficulty should be: ${difficulty}.
            The language of the questions and options MUST be completely in: ${language}.
            
            IMPORTANT: Return ONLY a raw JSON array. No markdown blocks, no introduction, no extra text. Just the JSON array.
            
            Format each object in the array exactly like this:
            [
                {
                    "passage": "Optional short reading passage or context (1-2 sentences). ONLY use this if it's a reading comprehension question, otherwise leave as empty string.",
                    "question": "What is 2 + 2?",
                    "options": ["3", "4", "5", "6"],
                    "correctAnswer": 1
                }
            ]
            Note: correctAnswer is the index (0-3) of the correct option in the options array. Keep questions clear and age-appropriate.`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${DEEPSEEK_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "deepseek/deepseek-chat", // Using Deepseek via OpenRouter as requested
                        messages: [{ role: "user", content: prompt }],
                    })
                });

                const data = await response.json();
                const aiResponse = data.choices[0].message.content.trim();
                
                // Clean potential markdown from AI response
                const jsonStr = aiResponse.replace(/```json/g, '').replace(/```/g, '').trim();
                const questions = JSON.parse(jsonStr);
                
                if (!Array.isArray(questions) || questions.length === 0 || !questions[0].question) {
                    throw new Error("Invalid AI response format");
                }
                return questions;
            } catch (error) {
                console.error("AI Generation Error:", error);
                throw error;
            }
        }

        async function analyzeStudentWithAI(student, submissions) {
            const dataSummary = submissions.map(s => `${s.assignmentTitle || 'Assessment'}: ${s.score}%`).join(' | ');
            const prompt = `You are an expert early education evaluator focusing on foundational literacy and numeracy for low-resource environments.
            Analyze the performance of this student:
            Name: ${student.name}
            Grade Level: ${student.grade || 'Early Grade'}
            Recent Test Scores: ${dataSummary || 'No tests taken yet. New student.'}
            
            Provide a concise, professional analysis. Include 3 sections:
            1. <h3>Current Standing</h3> (Where the student is at)
            2. <h3>Identified Learning Gaps</h3> (Based on scores)
            3. <h3>Recommended Interventions</h3> (Specific, personalized classroom or home activities that don't require internet/devices)
            
            Return the response in simple HTML format (using <h3>, <p>, <ul>, <li>). Do not include markdown code block backticks (like \`\`\`html) or raw JSON. Keep the tone supportive but analytical.`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${DEEPSEEK_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "deepseek/deepseek-chat",
                        messages: [{ role: "user", content: prompt }],
                    })
                });

                const data = await response.json();
                let aiResponse = data.choices[0].message.content.trim();
                // Clean up any potential markdown formatting from the AI
                return aiResponse.replace(/```html/g, '').replace(/```/g, '');
            } catch (error) {
                console.error("AI Analysis Error:", error);
                return "<p class='text-red-500'>Failed to generate AI analysis. Please check your connection and try again.</p>";
            }
        }

        function renderTeacherStudentsSection() {
            let rows = '';
            
            // Get unique classrooms for filter
            const classrooms = [...new Set(appState.students.map(s => s.classroom || s.grade || 'Unassigned'))];
            
            // Calculate ranks
            const getStudentStars = (id) => appState.submissions.filter(s => s.studentId === id).reduce((sum, sub) => sum + (sub.correct || 0), 0) * 10;
            const rankedStudents = [...appState.students].sort((a, b) => getStudentStars(b.id) - getStudentStars(a.id));
            const getRank = (id) => {
                const stars = getStudentStars(id);
                if (stars === 0) return '-';
                return rankedStudents.findIndex(s => s.id === id) + 1;
            };

            if (appState.students.length === 0) {
                rows = `<tr><td colspan="8" class="px-6 py-8 text-center text-slate-500">No students added yet. Click "Add Student" to begin.</td></tr>`;
            } else {
                appState.students.forEach((student, index) => {
                    // Calc subject averages
                    const subs = appState.submissions.filter(s => s.studentId === student.id);
                    
                    const mathAssignments = appState.assignments.filter(a => a.subject === 'Math').map(a => a.id);
                    const litAssignments = appState.assignments.filter(a => a.subject === 'Literacy').map(a => a.id);
                    
                    const mathSubs = subs.filter(s => mathAssignments.includes(s.assignmentId));
                    const litSubs = subs.filter(s => litAssignments.includes(s.assignmentId));

                    const getAvgHTML = (subjectSubs) => {
                        if (subjectSubs.length === 0) return `<span class="text-slate-400 text-xs">No Data</span>`;
                        const avg = Math.round(subjectSubs.reduce((a, c) => a + c.score, 0) / subjectSubs.length);
                        let color = avg >= 80 ? 'text-emerald-600' : (avg >= 50 ? 'text-yellow-600' : 'text-red-600');
                        return `<span class="font-bold ${color}">${avg}%</span>`;
                    };

                    rows += `
                        <tr class="hover:bg-slate-50 transition-colors border-b border-slate-100 student-row" data-class="${student.classroom || student.grade || 'Unassigned'}">
                            <td class="px-6 py-4 whitespace-nowrap">

                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-slate-700 text-center">
                                ${getRank(student.id) === 1 ? '<i class="fas fa-trophy text-yellow-500 mr-1"></i>' : ''} ${getRank(student.id) !== '-' ? '#' + getRank(student.id) : '-'}
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                ${getAvgHTML(mathSubs)}
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                ${getAvgHTML(litSubs)}
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-mono text-slate-600">
                                <div class="text-xs">User: <span class="font-bold">${student.username}</span></div>
                                <div class="text-xs">Pass: <span class="text-slate-400">${student.password}</span></div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                <div class="flex items-center justify-end gap-2">
                                    <button class="text-green-600 hover:text-green-800 bg-green-50 hover:bg-green-100 px-2 py-1.5 rounded-lg transition-colors flex items-center gap-1.5 notify-parent-btn" title="SMS Alert to Parent">
                                        <i class="fas fa-sms"></i>
                                    </button>
                                    <button class="text-purple-600 hover:text-purple-800 bg-purple-50 hover:bg-purple-100 px-2 py-1.5 rounded-lg transition-colors ai-report-btn flex items-center gap-1.5" data-id="${student.id}" title="AI Progress Report">
                                        <i class="fas fa-sparkles"></i>

                                        <i class="fas fa-edit"></i>
                                    </button>

                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            }

            return `

                    <div class="px-5 py-4 border-b border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white">

                                <select id="class-filter" class="w-full md:w-auto text-sm border border-slate-200 rounded-xl text-slate-600 py-2 pl-8 pr-8 bg-slate-50 outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 appearance-none transition-all cursor-pointer font-medium">
                                    <option value="all">All Classrooms</option>

                        <table class="min-w-full divide-y divide-slate-200">
                            <thead class="bg-slate-50">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Student Name</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Class/Batch</th>

                    currentQuestions = [...currentQuestions, ...generated];
                    if(!document.getElementById('ass-title').value) {
                        document.getElementById('ass-title').value = `${subject} (${lang}): ${topic}`;
                    }
                    renderQuestionsPreview();
                    showToast('AI Questions added!');
                    document.getElementById('ai-topic').value = '';
                } catch(err) {
                    showToast('Failed to generate AI questions.', 'error');
                } finally {
                    btn.innerHTML = '<i class="fas fa-bolt"></i> Generate';
                    btn.disabled = false;
                }
            });

            document.getElementById('add-manual-btn').addEventListener('click', () => {
                const passageText = document.getElementById('man-passage').value;
                const qText = document.getElementById('man-q').value;
                const options = [
                    document.getElementById('man-opt-0').value,
                    document.getElementById('man-opt-1').value,
                    document.getElementById('man-opt-2').value,
                    document.getElementById('man-opt-3').value
                ];
                const correct = parseInt(document.getElementById('man-correct').value);

                if(!qText || options.some(o => !o)) {
                    showToast('Please fill out question and all 4 options.', 'error');
                    return;
                }

                currentQuestions.push({ passage: passageText, question: qText, options: options, correctAnswer: correct });

                document.getElementById('man-passage').value = '';
                document.getElementById('man-q').value = '';
                document.getElementById('man-opt-0').value = '';
                document.getElementById('man-opt-1').value = '';
                document.getElementById('man-opt-2').value = '';
                document.getElementById('man-opt-3').value = '';

                renderQuestionsPreview();
                showToast('Manual question added!');
            });

            document.getElementById('save-assignment-btn').addEventListener('click', async (e) => {
                const btn = e.currentTarget;
                const targetType = document.getElementById('ass-target-type').value;
                let assignedTo = 'all';
                if (targetType === 'specific') {
                    const checked = Array.from(document.querySelectorAll('.stu-target-cb:checked')).map(cb => cb.value);
                    if (checked.length === 0) {
                        showToast('Please select at least one student or choose "All Students".', 'error');
                        return;
                    }
                    assignedTo = checked;
                }

                btn.innerHTML = 'Publishing...';
                
                await saveAssignment({
                    title: document.getElementById('ass-title').value,
                    subject: document.getElementById('ass-subject').value,
                    level: document.getElementById('ass-level').value,
                    assignedTo: assignedTo,
                    questions: currentQuestions
                });

                modal.classList.add('hidden');
                showToast('Assignment published!');
                const contentArea = document.getElementById('dynamic-section');
                if(contentArea) {
                    contentArea.innerHTML = renderTeacherAssignmentsSection();
                    attachAssignmentSectionListeners();
                }
            });
        }

        function attachSettingsListeners() {
            document.getElementById('settings-form')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                
                const newName = document.getElementById('admin-name').value.trim();
                const newUsername = document.getElementById('admin-username').value.trim();
                const p1 = document.getElementById('new-admin-pwd').value;
                const p2 = document.getElementById('confirm-admin-pwd').value;
                
                if (p1 || p2) {
                    if (p1 !== p2) {
                        showToast("Passwords do not match!", "error");
                        return;
                    }
                }
                
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
                btn.disabled = true;
                
                try {
                    const userRef = docPath('users', appState.user.id);
                    
                    const updateData = { name: newName, username: newUsername };
                    if (p1) updateData.password = p1;

                    await setDoc(userRef, { 
                        ...updateData, 
                        role: 'teacher'
                    }, { merge: true });
                    
                    appState.user.name = newName;
                    appState.user.username = newUsername;
                    if(p1) appState.user.password = p1; 
                    
                    showToast("Profile updated successfully!");
                    
                    document.getElementById('new-admin-pwd').value = '';
                    document.getElementById('confirm-admin-pwd').value = '';
                    
                    const sidebarName = document.getElementById('sidebar-user-name');
                    const sidebarInit = document.getElementById('sidebar-user-init');
                    if (sidebarName) sidebarName.textContent = newName;
                    if (sidebarInit) sidebarInit.textContent = newName.charAt(0);

                    showToast("Failed to update profile", "error");

                    btn.innerHTML = '<i class="fas fa-save"></i> Save Profile Changes';
                    btn.disabled = false;
                }
            });
        }

                                    <i class="fas fa-microphone text-xl"></i>
                                <div class="space-y-4" id="options-container">
                                ${q.passage ? `
                                    <div class="mb-6 p-5 bg-white border-2 border-indigo-100 rounded-2xl shadow-sm text-lg text-slate-700 leading-relaxed font-serif relative">
                                        <div class="absolute -top-3 -left-3 w-8 h-8 bg-indigo-500 text-white rounded-full flex items-center justify-center text-sm"><i class="fas fa-book-reader"></i></div>
                                        ${q.passage}
                                    </div>
                                ` : ''}
                                <h3 class="text-2xl font-display font-bold text-slate-800 mb-6 text-center leading-tight px-4">${q.question}</h3>
                                ${q.options.map((opt, idx) => `
                                    <button class="quiz-option w-full text-left p-4 md:p-5 rounded-2xl border-2 transition-all duration-200 flex items-center group
                                        ${quiz.answers[quiz.currentQuestionIndex] === idx 
                                            ? 'border-primary bg-indigo-50' 
                                            : 'border-slate-200 hover:border-indigo-300 hover:bg-slate-50'}" 
                                        data-idx="${idx}">
                                        <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center mr-4 font-bold text-sm shrink-0
                                            ${quiz.answers[quiz.currentQuestionIndex] === idx 
                                                ? 'border-primary bg-primary text-white' 
                                                : 'border-slate-300 text-slate-500 group-hover:border-indigo-300'}">
                                            ${String.fromCharCode(65+idx)}
                                        </div>
                                        <span class="text-lg text-slate-700 font-medium">${opt}</span>
                                    </button>
                                `).join('')}
                            </div>

                            <div class="mt-10 flex justify-between items-center pt-6 border-t border-slate-100">
                                <button id="prev-btn" class="${quiz.currentQuestionIndex === 0 ? 'invisible' : ''} px-6 py-3 rounded-xl font-medium text-slate-600 hover:bg-slate-100 transition-colors">
                                    <i class="fas fa-arrow-left mr-2"></i> Previous
                                </button>
                                
                                <button id="next-btn" class="px-8 py-3 rounded-xl font-bold text-white bg-primary hover:bg-primaryHover transition-colors shadow-md disabled:opacity-50 disabled:cursor-not-allowed" 
                                    ${quiz.answers[quiz.currentQuestionIndex] === null ? 'disabled' : ''}>
                                    ${isLast ? 'Submit Assessment' : 'Next Question <i class="fas fa-arrow-right ml-2"></i>'}
                                </button>
                            </div>
                        </div>
                    </main>
                </div>
            `;

            // Attach Listeners
            document.getElementById('exit-quiz').addEventListener('click', () => {
                if(confirm('Are you sure you want to exit? Your progress will not be saved.')) {
                    renderView('studentDashboard');
                }
            });

            document.querySelectorAll('.quiz-option').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.currentTarget.getAttribute('data-idx'));
                    quiz.answers[quiz.currentQuestionIndex] = idx;
                    renderQuizView(); // Re-render to show selection
                });
            });

            if(document.getElementById('prev-btn')) {
                document.getElementById('prev-btn').addEventListener('click', () => {
                    quiz.currentQuestionIndex--;
                    renderQuizView();
                });
            }

            document.getElementById('next-btn').addEventListener('click', () => {
                if (isLast) {
                    submitQuiz();
                } else {
                    quiz.currentQuestionIndex++;
                    renderQuizView();
                }
            });

            const voiceBtn = document.getElementById('voice-answer-btn');
            const voiceStatus = document.getElementById('voice-status');
            
            if (voiceBtn) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    const recognition = new SpeechRecognition();
                    recognition.continuous = false;
                    recognition.interimResults = false;
                    recognition.lang = 'en-US'; // Defaulting to English for standard A,B,C,D parsing

                    voiceBtn.addEventListener('click', () => {
                        recognition.start();
                        voiceBtn.classList.add('mic-pulse', 'bg-red-500');
                        voiceBtn.classList.remove('bg-primary');
                        voiceStatus.classList.remove('hidden');
                    });

                    recognition.onresult = (event) => {
                        const transcript = event.results[0][0].transcript.trim().toLowerCase();
                        let selectedIndex = -1;

                        // Try to match A, B, C, D or exact text of option
                        if (['a', 'hey', 'one', '1'].includes(transcript)) selectedIndex = 0;
                        else if (['b', 'bee', 'be', 'two', '2'].includes(transcript)) selectedIndex = 1;
                        else if (['c', 'see', 'sea', 'three', '3'].includes(transcript)) selectedIndex = 2;
                        else if (['d', 'dee', 'four', '4'].includes(transcript)) selectedIndex = 3;
                        else {
                            // Try to match the exact option text
                            q.options.forEach((opt, idx) => {
                                if(opt.toLowerCase().includes(transcript) || transcript.includes(opt.toLowerCase())) {
                                    selectedIndex = idx;
                                }
                            });
                        }

                        if (selectedIndex !== -1) {
                            quiz.answers[quiz.currentQuestionIndex] = selectedIndex;
                            showToast(`Answer selected: Option ${String.fromCharCode(65 + selectedIndex)}`);
                            renderQuizView(); // Re-render to show selection
                        } else {
                            showToast(`Heard "${transcript}". Couldn't match an option. Please click instead.`, 'error');
                        }
                    };

                    recognition.onend = () => {
                        voiceBtn.classList.remove('mic-pulse', 'bg-red-500');
                        voiceBtn.classList.add('bg-primary');
                        voiceStatus.classList.add('hidden');
                    };
                    
                    recognition.onerror = (e) => {
                        showToast(`Microphone error: ${e.error}`, 'error');
                    };
                } else {
                    voiceBtn.addEventListener('click', () => {
                        showToast("Voice answering is not supported in your browser.", "info");
                    });
                }
            }
        }

        // Global function for TTS to work inline
        window.speakText = (text) => {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                window.speechSynthesis.speak(utterance);
            } else {
                showToast("Text-to-speech not supported in this browser.", "info");
            }
        };

        async function submitQuiz() {
            const quiz = appState.activeQuiz;
            let correct = 0;
            
            quiz.assignment.questions.forEach((q, idx) => {
                if (quiz.answers[idx] === q.correctAnswer) correct++;
            });

            const score = Math.round((correct / quiz.assignment.questions.length) * 100);

            // Show loading state
            appEl.innerHTML = `
                <div class="h-screen flex flex-col items-center justify-center bg-background text-center px-4 fade-in">
                    <div class="loader mb-6"></div>
                    <h2 class="text-2xl font-bold text-slate-800">Analyzing your answers...</h2>
                </div>
            `;

            await saveSubmission({
                assignmentId: quiz.assignment.id,
                studentId: appState.user.id,
                answers: quiz.answers,
                correct,
                total: quiz.assignment.questions.length,
                score
            });

            // Show result
            const isGood = score >= 70;
            const icon = isGood ? 'fa-star text-yellow-400' : 'fa-hand-sparkles text-blue-400';
            const message = isGood ? 'Excellent job!' : 'Good effort! Keep practicing.';

            appEl.innerHTML = `
                <div class="h-screen flex flex-col items-center justify-center bg-background text-center px-4 fade-in">
                    <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center text-5xl shadow-lg mb-6">
                        <i class="fas ${icon}"></i>
                    </div>
                    <h1 class="text-4xl font-display font-bold text-slate-800 mb-2">${score}%</h1>
                    <h2 class="text-xl text-slate-600 mb-8">${message}</h2>
                    <p class="text-slate-500 mb-8">You got ${correct} out of ${quiz.assignment.questions.length} correct.</p>
                    <button id="return-dash" class="bg-primary hover:bg-primaryHover text-white px-8 py-3 rounded-xl font-bold transition-colors shadow-md">
                        Return to Dashboard
                    </button>
                </div>
            `;

            // Trigger confetti if good score
            if(isGood) triggerConfetti();

            document.getElementById('return-dash').addEventListener('click', () => {
                appState.activeQuiz = null;
                renderView('studentDashboard');
            });
        }

        function triggerConfetti() {
            // Simple DOM confetti implementation
            for (let i = 0; i < 50; i++) {
                const conf = document.createElement('div');
                conf.className = 'absolute w-3 h-3 rounded-sm z-50';
                conf.style.backgroundColor = ['#4F46E5', '#10B981', '#F59E0B', '#EF4444'][Math.floor(Math.random() * 4)];
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-10px';
                
                // Animation setup
                const duration = Math.random() * 3 + 2;
                conf.style.transition = `top ${duration}s linear, transform ${duration}s ease-in-out`;
                document.body.appendChild(conf);

                setTimeout(() => {
                    conf.style.top = '100vh';
                    conf.style.transform = `rotate(${Math.random() * 720}deg) translateX(${Math.random() * 100 - 50}px)`;
                }, 50);

                setTimeout(() => conf.remove(), duration * 1000);
            }
        }

        function renderView(viewName) {
            appState.currentView = viewName;
            switch(viewName) {
                case 'login': renderLogin(); break;
                case 'teacherDashboard': renderTeacherDashboard(); break;
                case 'studentDashboard': renderStudentDashboard(); break;
            }
        }

        function logout() {
            appState.user = null;
            appState.activeQuiz = null;
            renderView('login');
        }

        async function initApp() {
            try {
                // Rule 3: Auth Before Queries
                const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                if (token) {
                    // Try to use token if available in env
                    // Note: signInWithCustomToken requires import, doing anon fallback directly for simplicity in hackathon demo
                    await signInAnonymously(auth); 
                } else {
                    await signInAnonymously(auth);
                }

                // Wait for auth state
                await new Promise((resolve) => {
                    const unsubscribe = auth.onAuthStateChanged(user => {
                        if (user) {
                            unsubscribe();
                            resolve();
                        }
                    });
                });

                // Fetch initial data
                await fetchAllData();
                
                // Start UI
                renderView('login');
                
            } catch (error) {
                console.error("Initialization Error:", error);
                appEl.innerHTML = `
                    <div class="h-screen flex items-center justify-center text-red-500 flex-col">
                        <i class="fas fa-exclamation-triangle text-4xl mb-4"></i>
                        <p>Failed to initialize application.</p>
                        <p class="text-sm mt-2 text-slate-500">${error.message}</p>
                    </div>
                `;
            }
        }

        // Boot
        window.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
